<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — Hall of the Angler (Moonwell)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bigboard-body crt-skin">
    <div class="bigboard">
      <header>
        <h1>Hall of the Angler</h1>
        <p class="muted">Top-down tavern &amp; Moonwell — live patrons and deeds</p>
        <p id="status" class="pill"></p>
      </header>

      <section class="tavern-map-section card" aria-label="Tavern floor map">
        <h2 class="map-heading">Tavern floor (top-down)</h2>
        <p class="muted map-sub">Tokens = anglers at the rim. Center = the Moonwell.</p>
        <div class="tavern-map-frame">
          <canvas id="tavern-map" width="720" height="440" aria-label="Top-down map of the hall and Moonwell"></canvas>
        </div>
        <p id="patrons" class="patrons-line"></p>
      </section>

      <h2 class="feed-heading">Deeds &amp; catches</h2>
      <section id="feed" class="feed"></section>
    </div>
    <script type="module" src="/src/bigboard/main.ts"></script>
  </body>
</html>
