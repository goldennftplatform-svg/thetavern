# Public static site — visitors need zero Vercel login.
# One-time: GitHub repo → Settings → Pages → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build (subpath base for Pages)
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/bigboard.html
          test -f dist/audio/hall-ambience.mp3
          ls -la dist/
          ls -la dist/audio/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
