<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#080c12" />
    <title>The Moonwell Anglers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&family=Press+Start+2P&family=Silkscreen&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="crt-skin">
    <div id="app">
      <header class="top">
        <h1 id="title">The Moonwell Anglers</h1>
        <p id="tagline" class="muted"></p>
        <div id="trail-status" class="pill muted"></div>
      </header>

      <section id="nickname-gate" class="gate-screen">
        <div class="gate-screen-inner">
          <p class="gate-kicker">Knights of the Charter · Moonwell Anglers</p>
          <input
            id="nickname"
            type="text"
            maxlength="28"
            placeholder="Your name"
            autocomplete="username"
            inputmode="text"
            autofocus
          />
          <p id="gate-recall" class="gate-recall" hidden></p>
          <button type="button" id="btn-enter-name" class="btn primary big">Play</button>
          <button type="button" id="btn-skip-gate" class="btn ghost">Guest</button>
        </div>
      </section>

      <main id="game" hidden>
        <div id="play-shell" class="play-shell" data-phase="well">
          <header class="play-hud hud" aria-label="Status">
            <span id="hud-renown"></span>
            <span id="hud-tokens"></span>
            <span id="hud-season"></span>
            <span id="hud-deck" class="hud-deck" hidden></span>
            <span id="hud-buff" class="hud-buff" hidden></span>
          </header>

          <section class="play-stage" aria-label="Play area">
            <div class="stage-viewport">
              <div class="canvas-wrap">
                <canvas id="well" width="520" height="420" aria-label="Moonwell"></canvas>
              </div>
              <button type="button" id="btn-strike" class="btn strike strike-float" hidden>
                STRIKE!
              </button>
              <div id="play-toast" class="play-toast" hidden aria-live="polite"></div>
            </div>
          </section>

          <div id="play-menu" class="play-menu" hidden>
            <div id="phase-text" class="play-menu-body"></div>
          </div>

          <section id="play-live-feed" class="play-live-feed" hidden aria-label="Live hall chronicle">
            <button type="button" class="play-live-feed__head" aria-expanded="true">
              <span class="play-live-feed__dot" aria-hidden="true"></span>
              <span class="play-live-feed__title">Live chronicle</span>
              <span id="play-live-feed-meta" class="play-live-feed__meta"></span>
              <span class="play-live-feed__caret" aria-hidden="true">▼</span>
            </button>
            <div id="play-live-feed-body" class="play-live-feed__body">
              <p id="play-live-feed-patrons" class="play-live-feed__patrons"></p>
              <div id="play-live-feed-list" class="play-live-feed__list" aria-live="polite"></div>
              <footer class="play-live-feed__foot">
                <button type="button" id="btn-hall-view-feed" class="btn ghost">Hall view</button>
                <a id="play-live-feed-board" class="btn linkish" target="_blank" rel="noopener">Bigboard</a>
              </footer>
            </div>
          </section>

          <button type="button" id="play-live-chip" class="play-live-chip" hidden aria-label="Live hall patrons">
            <span class="play-live-chip__dot" aria-hidden="true"></span>
            <span class="play-live-chip__count">○</span>
          </button>

          <footer class="play-dock" aria-label="Actions">
            <div class="actions" id="actions">
              <button type="button" id="btn-primary" class="btn primary big"></button>
            </div>
            <div id="reel-controls" class="reel-pair" hidden>
              <button type="button" id="btn-slack" class="btn big ghost reel-tap">◀ Slack</button>
              <button type="button" id="btn-heave" class="btn big reel-tap">Heave ▶</button>
            </div>
          </footer>

          <details class="play-board-wrap">
            <summary class="play-board-summary">Board</summary>
            <aside class="card board">
              <ul id="notices"></ul>
              <button type="button" id="btn-charter" class="btn linkish">Rim notice</button>
            </aside>
          </details>
          <footer class="play-credits credits">
            <span id="credits-text"></span>
            <button type="button" id="btn-hall-view" class="btn linkish">Hall view</button>
            <button type="button" id="btn-charter-foot" class="btn linkish">Rim notice</button>
          </footer>
        </div>
      </main>
    </div>

    <dialog id="modal-demplar" class="charter-dialog" aria-labelledby="modal-title">
      <div class="charter-panel card">
        <button type="button" id="btn-modal-x" class="btn modal-x" aria-label="Close">✕</button>
        <h2 id="modal-title">Rim notice</h2>
        <p id="modal-body"></p>
        <button type="button" id="btn-close-modal" class="btn ghost big">Close</button>
      </div>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
